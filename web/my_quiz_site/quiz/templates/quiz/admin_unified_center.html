{% extends 'base.html' %}

{% block content %}
<div class="admin-center-wrapper" style="max-width: 1100px; margin: 40px auto; color: var(--text);">
    <h2 style="margin-bottom: 30px; display: flex; align-items: center;">
        <span style="background: var(--primary); padding: 5px 15px; border-radius: 8px; color: white; margin-right: 15px;">Admin</span>
        통합 운영 센터 (Unified Control Center)
    </h2>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
        <div style="background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border);">
            <h3 style="margin-bottom: 20px; color: var(--primary);">📥 스마트 일괄 등록</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div style="margin-bottom: 20px;">
                    <label>대상 시험 회차 선택</label>
                    <select name="exam_id" style="width: 100%; padding: 12px; border-radius: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border);">
                        {% for e in exams %}
                        <option value="{{ e.id }}">{{ e.title }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>시험 유형 선택</label>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <label class="mode-select"><input type="radio" name="upload_mode" value="written" checked> 필기 (OCR)</label>
                        <label class="mode-select"><input type="radio" name="upload_mode" value="practical"> 실기 (PDF Parser)</label>
                    </div>
                </div>

                <div style="margin-bottom: 30px; padding: 20px; border: 2px dashed var(--border); border-radius: 10px; text-align: center;">
                    <input type="file" name="upload_file" id="file-input" style="display: none;">
                    <label for="file-input" style="cursor: pointer; color: var(--sub);">
                        <strong>파일 선택</strong> 또는 드래그 앤 드롭<br>
                        (JPG, PNG, PDF 지원)
                    </label>
                </div>

                <button type="submit" class="nav-btn primary" style="width: 100%;">분석 및 자동 등록 시작</button>
            </form>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div style="background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border);">
                <h3 style="margin-bottom: 15px;">📊 등록 통계</h3>
                <div style="display: flex; justify-content: space-around; text-align: center;">
                    <div><small>전체 문제</small><br><strong style="font-size: 1.5rem;">1,240</strong></div>
                    <div><small>이미지 매칭</small><br><strong style="font-size: 1.5rem; color: var(--correct);">98%</strong></div>
                    <div><small>정답 미비</small><br><strong style="font-size: 1.5rem; color: var(--wrong);">3</strong></div>
                </div>
            </div>

            <div style="background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border);">
                <h3 style="margin-bottom: 15px;">🛠️ 빠른 관리 메뉴</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <a href="{% url 'admin_manual' %}" class="sub-btn" style="text-align: center; text-decoration: none;">📝 문제 일괄 편집</a>
                    <a href="#" class="sub-btn" style="text-align: center; text-decoration: none;">🖼️ 이미지 매칭 센터</a>
                    <a href="#" class="sub-btn" style="text-align: center; text-decoration: none;">📈 통계 리포트</a>
                    <a href="#" class="sub-btn" style="text-align: center; text-decoration: none;">⚙️ 시스템 설정</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .mode-select { cursor: pointer; padding: 8px 15px; border: 1px solid var(--border); border-radius: 5px; flex: 1; text-align: center; }
    .mode-select:has(input:checked) { border-color: var(--primary); background: rgba(65, 118, 144, 0.1); font-weight: bold; }
</style>
{% endblock %}

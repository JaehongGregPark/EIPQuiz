{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 1000px; margin: 50px auto; color: var(--text);">
    <div style="background: var(--card); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="margin-bottom: 20px;">🚀 실기 전용 일괄 업로드</h2>
        <p style="color: var(--sub); margin-bottom: 30px;">
            PDF에서 추출된 텍스트 전체(문제+정답)를 붙여넣으세요. 시스템이 과목별로 자동 분류합니다.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px; font-weight: bold;">1. 시험지 선택</label>
                <select name="exam_id" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text);">
                    {% for e in exams %}
                    <option value="{{ e.id }}">{{ e.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px; font-weight: bold;">2. 전체 텍스트 붙여넣기 (Page 1 ~ 6)</label>
                <textarea name="bulk_text" rows="20" style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; font-size: 13px;" placeholder="정보처리기사 실기... 내용을 통째로 붙여넣으세요."></textarea>
            </div>

            <div style="text-align: right;">
                <button type="submit" class="nav-btn primary" style="width: 200px;">자동 파싱 및 저장</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
